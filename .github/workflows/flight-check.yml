name: Flight Check

on:
  workflow_dispatch:

jobs:
  check-flight:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v5

      - name: Run Python script
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Execute flight checker
        run: python flight_checker.py
